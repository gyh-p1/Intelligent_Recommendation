server:
  port: 8080

spring:
  application:
    name: travel-server
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

ai:
  api-key: ${AI_API_KEY:}
  base-url: ${AI_BASE_URL:https://api.openai.com/v1}
  model: ${AI_MODEL:default}

logging:
  level:
    root: info
    com.travel.travelserver: debug
